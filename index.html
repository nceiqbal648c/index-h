<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai_travelanywhere - Pro Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070b12;
            --panel-bg: #101622;
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --neon-purple: #bd00ff;
            --text-main: #ffffff;
            --text-dim: #7888a5;
            --neon-green: #00e676;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: radial-gradient(circle at center, #162235 0%, #070b12 100%);
        }

        .dashboard {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: var(--panel-bg);
            padding: 25px 20px;
            box-sizing: border-box;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.15);
            border-left: 1px solid rgba(0, 242, 254, 0.15);
            border-right: 1px solid rgba(0, 242, 254, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 18px;
            margin-bottom: 22px;
        }

        .avatar-zone {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .avatar-zone i { font-size: 1.7rem; color: #fff; }
        .profile-info { text-align: left; }
        .brand-title { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
        .user-name { color: var(--neon-cyan); font-weight: 500; margin-top: 2px; font-size: 0.9rem; }

        /* 👑 স্মার্ট ওয়ান-ক্লিক ইন্সটল গাইড বাটন */
        .install-guide-box {
            background: rgba(0, 230, 118, 0.06);
            border: 1px dashed var(--neon-green);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.1);
        }

        .btn-install-trigger {
            background: linear-gradient(135deg, #00e676, #00f2fe);
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 230, 118, 0.3);
        }

        /* 팝업 অ্যানিমেশন গাইডলাইন */
        .popup-overlay {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            background: #172133;
            border: 2px solid var(--neon-cyan);
            padding: 15px;
            border-radius: 14px;
            width: 260px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
            z-index: 999;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-overlay p {
            margin: 0 0 10px 0;
            font-size: 0.88rem;
            line-height: 1.4;
            color: #fff;
            text-align: left;
        }

        .popup-overlay span {
            color: var(--neon-cyan);
            font-weight: 700;
        }

        .btn-close-popup {
            background: var(--neon-cyan);
            border: none;
            color: #000;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            float: right;
        }

        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .hub-card { background: #0b101a; padding: 14px 10px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.04); font-size: 0.85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .hub-card.active { border-color: rgba(0, 242, 254, 0.35); color: var(--neon-cyan); background: rgba(0, 242, 254, 0.05); text-shadow: 0 0 8px rgba(0, 242, 254, 0.4); }

        .input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 18px 100px 18px 20px; box-sizing: border-box; background: #080c14; border: 1px solid rgba(0, 242, 254, 0.25); border-radius: 16px; color: #fff; font-size: 1rem; outline: none; transition: all 0.3s ease; }
        input[type="text"]:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }

        .btn-paste { position: absolute; right: 8px; padding: 10px 16px; border: none; border-radius: 12px; background: rgba(0, 242, 254, 0.15); color: var(--neon-cyan); font-size: 0.85rem; font-weight: 700; cursor: pointer; border: 1px solid rgba(0, 242, 254, 0.3); transition: all 0.2s ease; }

        .progress-container { background: #080c14; border-radius: 14px; padding: 15px; margin-bottom: 25px; text-align: left; border: 1px solid rgba(255, 255, 255, 0.03); }
        .progress-label { font-size: 0.85rem; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 8px; }
        .bar-bg { height: 8px; background: #172030; border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan)); box-shadow: 0 0 8px var(--neon-cyan); transition: width 0.3s ease; }

        .action-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .core-btn { width: 100%; padding: 18px; border: none; border-radius: 16px; font-size: 1.05rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-video { background: linear-gradient(135deg, #0072ff, #00f2fe); color: #fff; box-shadow: 0 6px 20px rgba(0, 114, 255, 0.35); }
        .btn-audio { background: linear-gradient(135deg, #7b00ff, #bd00ff); color: #fff; box-shadow: 0 6px 20px rgba(189, 0, 255, 0.35); }
        .core-btn:disabled { background: #1d2636; color: var(--text-dim); box-shadow: none; cursor: not-allowed; transform: none; }

        .status-logger { margin: 10px 0 20px 0; font-size: 0.95rem; font-weight: 500; min-height: 22px; text-align: center; }
        .log-loading { color: var(--neon-cyan); }
        .log-success { color: var(--neon-green); }
        .log-error { color: #ff5252; }

        .live-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 18px; border-top: 1px solid rgba(255, 255, 255, 0.08); margin-top: auto; }
        .stat-node { font-size: 0.8rem; color: var(--text-dim); text-align: center; background: #080c14; padding: 10px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.02); }
        .stat-node span { color: var(--neon-cyan); font-weight: 600; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="popup-overlay" id="guide-popup">
            <p><i class="fa-solid fa-arrow-up" style="color: var(--neon-cyan); font-size: 1.2rem; float: right; margin-left: 10px;"></i> ওপরের ডানদিকের কোনায় <span>তিনটি ডট (⋮)</span> মেনুতে চাপ দিন।</p>
            <p>তারপর নিচে থেকে <span>"Add to Home screen"</span> অপশনটি সিলেক্ট করলেই এটি অ্যাপ হয়ে যাবে!</p>
            <button class="btn-close-popup" onclick="closeGuide()">OK, Got It</button>
        </div>

        <div>
            <div class="profile-header">
                <div class="avatar-zone"><i class="fa-solid fa-user-gear"></i></div>
                <div class="profile-info">
                    <div class="brand-title">Ai_travelanywhere</div>
                    <div class="user-name">Iqbal Ahmed</div>
                </div>
            </div>

            <div class="install-guide-box">
                <button class="btn-install-trigger" onclick="showInstallGuide()">
                    <i class="fa-solid fa-mobile-screen-button"></i> Install Mobile App
                </button>
            </div>

            <div class="hub-grid">
                <div class="hub-card active"><i class="fa-solid fa-wand-magic-sparkles"></i> Creative Hub</div>
                <div class="hub-card"><i class="fa-solid fa-globe"></i> Global Content</div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="stream-url" placeholder="Enter stream or video link...">
                <button class="btn-paste" onclick="directPaste()">
                    <i class="fa-regular fa-clipboard"></i> Paste
                </button>
            </div>

            <div class="progress-container">
                <div class="progress-label">
                    <span id="progress-status">Engine Idle</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill" id="bar-fill"></div>
                </div>
            </div>

            <div class="action-container">
                <button class="core-btn btn-video" id="v-btn" onclick="triggerDownload('video')">
                    <i class="fa-solid fa-video"></i> Download Video (MP4)
                </button>
                <button class="core-btn btn-audio" id="a-btn" onclick="triggerDownload('audio')">
                    <i class="fa-solid fa-music"></i> Download Audio (MP3)
                </button>
            </div>

            <div class="status-logger" id="log-display"></div>
        </div>

        <div class="live-stats">
            <div class="stat-node"><i class="fa-solid fa-server"></i> Servers: <span>Active (104)</span></div>
            <div class="stat-node"><i class="fa-solid fa-bolt"></i> Speed: <span>10 Gbps</span></div>
        </div>
    </div>

    <script>
        // 📋 পেস্ট বাটন লজিক
        async function directPaste() {
            const inputField = document.getElementById('stream-url');
            const logger = document.getElementById('log-display');
            try {
                const copiedText = await navigator.clipboard.readText();
                if (copiedText) {
                    inputField.value = copiedText;
                    logger.className = "status-logger log-success";
                    logger.innerHTML = "<i class='fa-solid fa-check-double'></i> Stream link integrated successfully!";
                    setTimeout(() => { logger.innerHTML = ""; }, 2500);
                }
            } catch (err) {
                logger.className = "status-logger log-error";
                logger.innerHTML = "<i class='fa-solid fa-lock'></i> Please long-press inside box to paste link.";
            }
        }

        // 📥 ডাউনলোড নোড লজিক
        function triggerDownload(type) {
            const urlTarget = document.getElementById('stream-url').value.trim();
            const vBtn = document.getElementById('v-btn');
            const aBtn = document.getElementById('a-btn');
            const logger = document.getElementById('log-display');
            const bar = document.getElementById('bar-fill');
            const pStatus = document.getElementById('progress-status');
            const pPercent = document.getElementById('progress-percent');

            if (urlTarget === "") {
                logger.className = "status-logger log-error";
                logger.innerHTML = "<i class='fa-solid fa-circle-exclamation'></i> Operational Error: Link field required!";
                return;
            }

            vBtn.disabled = true;
            aBtn.disabled = true;
            logger.className = "status-logger log-loading";
            logger.innerHTML = `<i class='fa-solid fa-terminal fa-spin'></i> Injecting Python Stream Decoder...`;

            let currentProgress = 0;
            pStatus.innerText = type === 'video' ? "Extracting Video Layers..." : "Encoding Audio Track...";
            
            const progressInterval = setInterval(() => {
                currentProgress += Math.floor(Math.random() * 15) + 6;
                if (currentProgress >= 95) currentProgress = 95;
                bar.style.width = currentProgress + "%";
                pPercent.innerText = currentProgress + "%";
            }, 250);

            setTimeout(() => {
                clearInterval(progressInterval);
                bar.style.width = "100%";
                pPercent.innerText = "100%";
                pStatus.innerText = "Core Extracted!";
                logger.className = "status-logger log-success";
                logger.innerHTML = `<i class='fa-solid fa-circle-check'></i> Pipeline Core Synchronized! File downloading...`;

                if (urlTarget.includes("googlevideo.com")) {
                    const downloaderNode = document.createElement('a');
                    downloaderNode.href = urlTarget;
                    downloaderNode.setAttribute('download', type === 'video' ? 'Ai_Travel_Video.mp4' : 'Ai_Travel_Audio.mp3');
                    downloaderNode.target = '_blank';
                    document.body.appendChild(downloaderNode);
                    downloaderNode.click();
                    document.body.removeChild(downloaderNode);
                } else {
                    window.open(urlTarget, '_blank');
                }

                setTimeout(() => {
                    vBtn.disabled = false;
                    aBtn.disabled = false;
                    bar.style.width = "0%";
                    pPercent.innerText = "0%";
                    pStatus.innerText = "Engine Idle";
                }, 2000);
            }, 2600);
        }

        // 📱 ইন-অ্যাপ গাইডেন্স লজিক
        function showInstallGuide() {
            document.getElementById('guide-popup').style.display = 'block';
        }

        function closeGuide() {
            document.getElementById('guide-popup').style.display = 'none';
        }
    </script>
</body>
</html>
