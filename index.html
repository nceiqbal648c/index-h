<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.TravelAnywhere - Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e17;
            --card-bg: #131a26;
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --text-color: #ffffff;
            --text-muted: #6c7a9c;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15);
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
        }

        /* --- নতুন নো-ইমেজ নিয়ন লোগো স্টাইল --- */
        .brand-logo-container {
            margin-bottom: 20px;
        }

        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.6));
            animation: pulse 2s infinite alternate;
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 10px;
            background: linear-gradient(135deg, #ffffff, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-tag {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.4);
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); }
            100% { filter: drop-shadow(0 0 18px rgba(0, 242, 254, 0.9)); }
        }
        /* ------------------------------------- */

        .input-group {
            margin: 25px 0;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 15px 15px 20px;
            box-sizing: border-box;
            background: #0d131e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .download-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-logo-container">
            <i class="fa-solid fa-cloud-arrow-down brand-icon"></i>
            <div class="brand-name">AI.TravelAnywhere</div>
            <div class="brand-tag">Media Downloader</div>
        </div>

        <div class="input-group">
            <input type="text" placeholder="Paste your video or image link here...">
        </div>

        <button class="download-btn">
            <i class="fa-solid fa-download"></i> Download Now
        </button>

        <div class="footer-text">
            &copy; 2026 AI.TravelAnywhere. All Rights Reserved.
        </div>
    </div>

</body>
</html>
